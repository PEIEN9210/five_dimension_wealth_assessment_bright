<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五維財富動力學｜個人資源盤點</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Noto Sans TC", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f8fbff 0%, #eef7ff 100%);
      color: #1e293b;
      padding: 32px;
    }

    .container {
      max-width: 1400px;
      margin: auto;
    }

    .hero {
      background: white;
      border-radius: 20px;
      padding: 18px 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,.05);
      margin-bottom: 14px;
      position: sticky;
      top: 8px;
      z-index: 10;
}

    h1 {
      font-size: 2.5rem;
      margin-bottom: 12px;
      background: linear-gradient(90deg,#2563eb,#06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #64748b;
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
      gap: 10px;
      margin-bottom: 14px;
}

    .score-card {
      background: linear-gradient(135deg,#ffffff,#f1f7ff);
      border: 1px solid #dbeafe;
      border-radius: 14px;
      padding: 10px 12px;
}

    .score-title {
      color: #64748b;
      margin-bottom: 10px;
      font-size: .95rem;
    }

    .score-value {
      font-size: 2rem;
      font-weight: 800;
      color: #2563eb;
    }

    .section {
      background: white;
      border-radius: 28px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,.05);
    }

    .section h2 {
      margin-bottom: 24px;
      color: #0f172a;
    }

    .question {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
      margin-bottom: 16px;
      transition: .2s ease;
      background: #fff;
    }

    .question:hover {
      border-color: #93c5fd;
      transform: translateY(-2px);
    }

    .question p {
      line-height: 1.8;
      margin-bottom: 12px;
      font-weight: 500;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 1rem;
      background: #f8fafc;
    }

    .btn {
      border: none;
      padding: 10px 18px;
      border-radius: 12px;
      background: linear-gradient(90deg,#2563eb,#06b6d4);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(37,99,235,.2);
    }

    .report {
      display: none;
      margin-top: 40px;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px;
    }

    .report-card {
      background: linear-gradient(135deg,#ffffff,#f8fbff);
      border: 1px solid #dbeafe;
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .report-card h3 {
      margin-bottom: 16px;
      color: #1d4ed8;
    }

    .status {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 700;
    }

    ul {
      padding-left: 20px;
      line-height: 2;
      color: #334155;
    }

    canvas {
      max-width: 600px;
      margin: 30px auto;
    }

    .footer-note {
      margin-top: 40px;
      text-align: center;
      color: #64748b;
      line-height: 1.8;
    }

    @media(max-width:768px){
      body{padding:16px;}
      .hero,.section{padding:24px;}
      h1{font-size:2rem;}
    }
    
    .mini-header{
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 1200px;

      background: rgba(255,255,255,.88);
      backdrop-filter: blur(14px);

      border: 1px solid rgba(255,255,255,.5);

      border-radius: 18px;

      padding: 12px 18px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      box-shadow: 0 10px 30px rgba(0,0,0,.08);

      z-index: 999;

      transition: all .35s ease;
    }
    
    .mini-header.show{
      top: 12px;
    }

    .mini-title{
      font-size: 1rem;
      font-weight: 800;
      color: #0f172a;
    }
    .mini-score{
      font-weight: 700;
      color: #2563eb;
    }
    .mini-btn{
      border:none;
      padding:10px 16px;
      border-radius:12px;

      background: linear-gradient(90deg,#2563eb,#06b6d4);

      color:white;
      font-weight:700;
      cursor:pointer;
    }
    
  </style>
</head>

      </p>

      <div class="top-grid">
        <div class="score-card">
          <div class="score-title">金錢 MONEY</div>

        </div>

        </div>

        <div class="score-card">

          <div class="score-value" id="timeScore">0.0</div>
        </div>

        <div class="score-card">
          <div class="score-title">人脈 CONNECTIONS</div>
          <div class="score-value" id="connectionScore">0.0</div>
        </div>

        <div class="score-card">
          <div class="score-title">能力 CAPABILITY</div>
          <div class="score-value" id="abilityScore">0.0</div>
        </div>
      </div>

      <button class="btn" onclick="generateReport()">生成個人分析報告</button>
    </div>

    <div class="mini-header" id="miniHeader">
      <div class="mini-title">
        五維財富動力學
      </div>
      <div class="mini-score">
        整體財富轉化效率：<span id="miniOverall">0.0</span>
      </div>

      <button class="mini-btn" onclick="generateReport()">
        生成報告
      </button>
    </div>
    
    <div id="questionContainer"></div>

    <div class="report" id="reportSection">
      <div class="section">
        <div class="report-header">
          <div>
            <h2>個人深度分析報告</h2>
            <p id="overallText"></p>
          </div>
        </div>

        <canvas id="radarChart"></canvas>

        <div id="reportCards"></div>
      </div>
    </div>

    <div class="footer-note">
      五維財富動力學 © 2026 ｜ Global ESG Leadership Organization
    </div>
  </div>

    function calculateDimension(key){
      const selects = document.querySelectorAll(`select[data-dimension="${key}"]`);
      let total = 0;
      let count = 0;

      selects.forEach(select => {
        if(select.value !== ''){
          total += Number(select.value);
          count++;
        }
      });

      if(count === 0) return 0;
      return ((total / count) * 2).toFixed(1);
    }
