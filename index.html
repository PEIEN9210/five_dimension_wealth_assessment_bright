  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Noto Sans TC", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f8fbff 0%, #eef7ff 100%);
      color: #1e293b;
      padding: 32px;
    }

    .container {
      max-width: 1400px;
      margin: auto;
    }

    .hero {
      background: white;
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,.08);
      margin-bottom: 28px;
      position: sticky;
      top: 20px;
      z-index: 10;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 12px;
      background: linear-gradient(90deg,#2563eb,#06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #64748b;
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .score-card {
      background: linear-gradient(135deg,#ffffff,#f1f7ff);
      border: 1px solid #dbeafe;
      border-radius: 20px;
      padding: 20px;
    }

    .score-title {
      color: #64748b;
      margin-bottom: 10px;
      font-size: .95rem;
    }

    .score-value {
      font-size: 2rem;
      font-weight: 800;
      color: #2563eb;
    }

    .section {
      background: white;
      border-radius: 28px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,.05);
    }

    .section h2 {
      margin-bottom: 24px;
      color: #0f172a;
    }

    .question {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
      margin-bottom: 16px;
      transition: .2s ease;
      background: #fff;
    }

    .question:hover {
      border-color: #93c5fd;
      transform: translateY(-2px);
    }

    .question p {
      line-height: 1.8;
      margin-bottom: 12px;
      font-weight: 500;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 1rem;
      background: #f8fafc;
    }

    .btn {
      border: none;
      padding: 16px 28px;
      border-radius: 18px;
      background: linear-gradient(90deg,#2563eb,#06b6d4);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(37,99,235,.25);
    }

    .report {
      display: none;
      margin-top: 40px;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px;
    }

    .report-card {
      background: linear-gradient(135deg,#ffffff,#f8fbff);
      border: 1px solid #dbeafe;
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .report-card h3 {
      margin-bottom: 16px;
      color: #1d4ed8;
    }

    .status {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 700;
    }

    ul {
      padding-left: 20px;
      line-height: 2;
      color: #334155;
    }

    canvas {
      max-width: 600px;
      margin: 30px auto;
    }

    .footer-note {
      margin-top: 40px;
      text-align: center;
      color: #64748b;
      line-height: 1.8;
    }

    @media(max-width:768px){
      body{padding:16px;}
      .hero,.section{padding:24px;}
      h1{font-size:2rem;}
    }
  </style>
</head>

const questionContainer = document.getElementById('questionContainer');

    Object.keys(dimensions).forEach(key => {
      const section = document.createElement('div');
      section.className = 'section';

      section.innerHTML = `
        <h2>${dimensions[key].title}</h2>
        <p style="color:#64748b;margin-bottom:24px;">${dimensions[key].description}</p>
      `;

      dimensions[key].questions.forEach((q,index) => {
        const question = document.createElement('div');
        question.className = 'question';

        question.innerHTML = `
          <p>${index + 1}. ${q}</p>
          <select data-dimension="${key}">
            <option value="">請選擇評分</option>
            <option value="1">1｜幾乎從不</option>
            <option value="2">2｜偶爾</option>
            <option value="3">3｜有時</option>
            <option value="4">4｜經常</option>
            <option value="5">5｜總是</option>
          </select>
        `;

        section.appendChild(question);
      });

      questionContainer.appendChild(section);
    });

    function calculateDimension(key){
      const selects = document.querySelectorAll(`select[data-dimension="${key}"]`);
      let total = 0;
      let count = 0;

      selects.forEach(select => {
        if(select.value !== ''){
          total += Number(select.value);
          count++;
        }
      });

      if(count === 0) return 0;
      return ((total / count) * 2).toFixed(1);
    }

      if(score < 6.5) return '◆ 待提升';
      if(score < 8.5) return '● 良好基礎';
      return '★ 槓桿資產';
    }

        ],
        time:[
          '建立每日深度工作區塊',
          '刪除低價值重複工作',
          '提高授權與系統化比例'
        ],
        connections:[
          '主動維護高品質人脈',
          '增加跨領域交流',
          '持續輸出價值建立信任'
        ],
        ability:[
          '建立未來3年技能地圖',
          '培養跨領域整合能力',
          '強化可被市場辨識的優勢'
        ]
      };

      return adviceMap[key];
    }

    let radarChart;

    function generateReport(){
      const scores = {
        money: Number(calculateDimension('money')),
        energy: Number(calculateDimension('energy')),
        time: Number(calculateDimension('time')),
        connections: Number(calculateDimension('connections')),
        ability: Number(calculateDimension('ability')),
      };

      document.getElementById('moneyScore').innerText = scores.money;
      document.getElementById('energyScore').innerText = scores.energy;
      document.getElementById('timeScore').innerText = scores.time;
      document.getElementById('connectionScore').innerText = scores.connections;
      document.getElementById('abilityScore').innerText = scores.ability;

      const overall = (
        (scores.money + scores.energy + scores.time + scores.connections + scores.ability) / 5
      ).toFixed(1);

      document.getElementById('overallText').innerHTML = `
        整體財富轉化效率：<strong>${overall} / 10</strong>
      `;

      const reportCards = document.getElementById('reportCards');
      reportCards.innerHTML = '';

      Object.keys(scores).forEach(key => {
        const card = document.createElement('div');
        card.className = 'report-card';

        card.innerHTML = `
          <h3>${dimensions[key].title}</h3>
          <p><strong>得分：</strong>${scores[key]} / 10</p>
          <div class="status">${getLevel(scores[key])}</div>

          <div style="margin-top:20px;">
            <h4 style="margin-bottom:12px;">優先行動建議</h4>
            <ul>
              ${getAdvice(key,scores[key]).map(item => `<li>${item}</li>`).join('')}
            </ul>
          </div>
        `;

        reportCards.appendChild(card);
      });

      document.getElementById('reportSection').style.display = 'block';

      const ctx = document.getElementById('radarChart');

      if(radarChart){
        radarChart.destroy();
      }

      radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['金錢','精力','時間','人脈','能力'],
          datasets: [{
            label: '五維財富評分',
            data: [
              scores.money,
              scores.energy,
              scores.time,
              scores.connections,
              scores.ability
            ],
            fill: true
          }]
        },
        options: {
          responsive: true,
          scales: {
            r: {
              min: 0,
              max: 10,
              ticks: {
                stepSize: 2
              }
            }
          }
        }
      });

      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: 'smooth'
      });
    }
  </script>
</body>
</html>
